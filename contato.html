  <style>
    /* ================= HERO ================= */

    .hero {
      position: relative;
      background:
        linear-gradient(rgba(248, 244, 239, 0.40),
          rgba(248, 244, 239, 0.43)),
         url("fotos_icons/banner_pg_ctt.png");
      background-size: cover;
      background-position: center;
      padding: 110px 20px 90px;
      text-align: center;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      width: 130px;
      height: 3px;
      background: linear-gradient(to right, #d39b36, #f0c77b);
      position: absolute;
      bottom: 45px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 20px;
    }

    .hero-mini-title {
      display: inline-block;
      color: var(--marrom-escuro);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 4px;
      margin-bottom: 18px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      font-weight: 700;
      color: var(--marrom-escuro);
      margin-bottom: 18px;
    }

    .hero p {
      max-width: 650px;
      margin: 0 auto;
      font-size: 1.15rem;
      line-height: 1.8;
      color: var(--marrom-medio);
    }

    /* ================= CONTATO ================= */

    .contact-section {
      padding: 80px 40px 100px;
    }

    .contact-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .contact-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(211, 155, 54, 0.18);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      transition: 0.35s ease;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(8px);
    }

   /*contact-card:hover {
      transform: translateY(-8px);
      border-color: var(--mostarda);
      box-shadow: 0 22px 45px rgba(0, 0, 0, 0.12);
    }*/

    .contact-icon {
      width: 75px;
      height: 75px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: linear-gradient(to bottom, #f7e7c5, #fff7eb);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 8px 20px rgba(211, 155, 54, 0.18);
    }

    .contact-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: var(--marrom-escuro);
      margin-bottom: 16px;
    }

    .contact-card p {
      color: var(--marrom);
      font-size: 1rem;
      line-height: 1.8;
    }

    .contact-card a {
      color: var(--marrom);
      text-decoration: none;
      transition: 0.3s;
    }

    .contact-card a:hover {
      color: var(--mostarda);
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 30px;
    }

    .social-icons img {
      width: 42px;
      transition: 0.3s ease;
    }

    .social-icons img:hover {
      transform: translateY(-5px) scale(1.08);
    }

    /* ================= RESPONSIVO ================= */

    @media (max-width: 768px) {
      .hero {
        padding: 90px 20px 75px;
      }

      .hero h1 {
        font-size: 2.8rem;
      }

      .hero p {
        font-size: 1rem;
      }

      .hero-mini-title {
        font-size: 0.75rem;
        letter-spacing: 3px;
      }

      .contact-section {
        padding: 60px 20px 80px;
      }

      .contact-card {
        padding: 35px 25px;
      }

      .contact-card h2 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
