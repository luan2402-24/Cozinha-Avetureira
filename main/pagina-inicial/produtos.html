<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozinha Aventureira - Produtos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">


<style> /* definição de variaveis de cores */
  :root {
    --cream: #f5f0e8;
    --warm-beige: #e8dece;
    --dark-brown: #2c1a0e;
    --medium-brown: #6b3f1f;
    --gold: #c8922a;
    --rust: #b85c2c;
    --navy: #1e2d40;
    --text: #3a2310;
    --card-bg: #fffdf8;
    --shadow: rgba(44, 26, 14, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* NAV */
  nav {
    background: var(--cream);
    padding: 18px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--warm-beige);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(8px);
  }
  .logo-icon {
    width: 52px; height: 52px;
    background: var(--dark-brown);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 13px; line-height: 1.2;
    text-align: center; padding: 6px; font-style: italic;
  }
  /* HERO */
  .hero { padding: 52px 48px 32px; text-align: center; }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    color: var(--dark-brown); line-height: 1.2; margin-bottom: 10px;
  }
  .hero p { font-size: 15px; color: var(--medium-brown); max-width: 440px; margin: 0 auto; }

  /* Grade de categoria para reorganização automática conforme a largura. */
  .categories {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
    padding: 20px 48px 60px;
    max-width: 1100px; margin: 0 auto;
  }
  .category-card {
    background: var(--card-bg);
    border: 1.5px solid var(--warm-beige);
    border-radius: 4px; overflow: hidden; cursor: pointer; position: relative;
    transition: transform .25s ease, box-shadow .25s ease, border-color .25s;
  }
  .category-card:hover { /* Ganha sombra ao passar o mouse */
    transform: translateY(-6px);
    box-shadow: 0 16px 40px var(--shadow);
    border-color: var(--gold);
  }
  .category-card img {
    width: 100%; height: 220px; object-fit: cover; display: block;
    transition: transform .4s ease;
  }
  .category-card:hover img { transform: scale(1.04); }
  .cat-label {
    padding: 18px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 700; color: var(--dark-brown);
  }
  .arrow {
    position: absolute; top: 14px; right: 14px;
    background: var(--gold); color: #fff;
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; opacity: 0; transition: opacity .25s;
  }
  .category-card:hover .arrow { opacity: 1; }

  /* QUOTE (Identidade da marca) */
  .quote-section {
    background: var(--warm-beige);
    padding: 52px 48px;
    display: flex; align-items: center; justify-content: center;
    gap: 40px; flex-wrap: wrap;
  }
  .quote-icons { font-size: 3.2rem; }
  .quote-text { text-align: center; }
  .quote-text p {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.05rem, 2.5vw, 1.4rem);
    color: var(--rust); line-height: 1.45; font-style: italic; margin-bottom: 12px;
  }
  .signature { font-family: 'Dancing Script', cursive; font-size: 1.55rem; color: var(--medium-brown); }

  /* FOOTER */
  footer { background: var(--navy); color: #aab4c0; padding: 28px 48px; text-align: center; }
  .footer-links {
    display: flex; justify-content: center; gap: 40px;
    font-size: 13px; margin-bottom: 18px; flex-wrap: wrap;
  }
  .footer-links a { color: #aab4c0; text-decoration: none; transition: color .2s; }
  .footer-links a:hover { color: #fff; }
  .social-icons { display: flex; justify-content: center; gap: 16px; }
  .social-icons a {
    width: 34px; height: 34px; border: 1px solid #3a4f65; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #aab4c0; text-decoration: none; font-size: 13px; font-weight: 500;
    transition: border-color .2s, color .2s;
  }
  .social-icons a:hover { border-color: var(--gold); color: var(--gold); }

  /* MODAL */
  .modal-overlay { /* modal com desfoque de fundo (efeito de vidro)*/
    position: fixed; inset: 0;
    background: rgba(30,20,10,.55);
    backdrop-filter: blur(4px);
    z-index: 200; display: none;
    align-items: flex-start; justify-content: center;
    padding: 60px 20px 40px; overflow-y: auto;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: 6px; width: 100%; max-width: 900px;
    animation: slideUp .3s ease; overflow: hidden;
  }
  @keyframes slideUp {
    from { transform: translateY(28px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-header {
    background: var(--dark-brown); color: #fff;
    padding: 22px 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 1.55rem; font-style: italic; }
  .modal-close {
    background: none; border: none; color: #fff;
    font-size: 26px; cursor: pointer; line-height: 1; transition: color .2s;
  }
  .modal-close:hover { color: var(--gold); }

  /* PRODUCTS GRID */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
    gap: 20px; padding: 28px;
  }
  .product-card {
    border: 1.5px solid var(--warm-beige);
    border-radius: 4px; overflow: hidden; background: #fff;
    transition: box-shadow .2s, transform .2s;
  }
  .product-card:hover { box-shadow: 0 8px 24px var(--shadow); transform: translateY(-3px); }
  .product-card img { width: 100%; height: 160px; object-fit: cover; display: block; }
  .no-img {
    width: 100%; height: 160px; background: var(--warm-beige);
    display: flex; align-items: center; justify-content: center; font-size: 2.8rem;
  }
  .product-info { padding: 14px 16px; }
  .product-info h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; margin-bottom: 5px; color: var(--dark-brown);
  }
  .product-info .price { font-weight: 600; color: var(--rust); font-size: .95rem; }
  .product-info .desc { font-size: .8rem; color: #999; margin-top: 5px; line-height: 1.45; }
  .empty-state {
    text-align: center; padding: 50px 20px;
    color: #bbb; font-style: italic; grid-column: 1 / -1;
  }
  .empty-state span { font-size: 3rem; display: block; margin-bottom: 10px; }

  @media (max-width: 600px) {
    nav { padding: 14px 20px; }
    .categories { padding: 16px 20px 40px; gap: 16px; }
    .hero { padding: 36px 20px 20px; }
    .quote-section { padding: 36px 20px; }
    footer { padding: 24px 20px; }
    .footer-links { gap: 20px; }
    .products-grid { padding: 18px; gap: 14px; }
  }
</style>
</head>
<body>

<nav>
  <div class="logo-icon">ADD<br>LOGO</div>
</nav>

<div class="hero">
  <h1>Nossos Produtos</h1>
  <p>Escolha uma categoria e veja todas as delícias disponíveis</p>
</div>

<div class="categories" id="categories"></div>

<div class="quote-section">
  <div class="quote-text">
    <p>Um projeto sobre coragem,<br>cozinha e amor!</p>
    <div class="signature">Taísa Fonseca</div>
  </div>
</div>

<footer>
  <div class="footer-links">
    <a href="#">Termos de Uso</a>
    <a href="#">Política de Privacidade</a>
    <a href="#">Redes Sociais</a>
  </div>
  <div class="social-icons">
    <a href="#" title="Instagram">ig</a>
    <a href="#" title="Facebook">em</a>
    <a href="#" title="WhatsApp">wp</a>
  </div>
</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</div>

<script>

const CATEGORIES = [

  // DOCES 
  {
    id: 'doces',
    label: 'Doces',
    emoji: '🍫',
    img: '', //espaço para colocar o link da imagem que está na pasta (codigo ainda não está 100%)
    products: [
      {
        name: 'Adicionar item',
        price: '0,00',
        desc: 'PROJETO AINDA ESTÁ SENDO FEITO (Otavio)',
        img: '' //espaço para colocar o link da imagem que está na pasta (codigo ainda não está 100%)
      },
      
    ]
  },

  //  BOLOS 
  {
    id: 'bolos',
    label: 'Bolos',
    emoji: '🎂',
    img: '', //espaço para colocar o link da imagem que está na pasta (codigo ainda não está 100%)
    products: [
      {
        name: 'ADICIONAR ITEM',
        price: '00,00',
        desc: 'PROJETO AINDA ESTÁ SENDO FEITO (Otavio)',
        img: '' //espaço para colocar o link da imagem que está na pasta (codigo ainda não está 100%)
      },
      
      // 
    ]
  },

  //  SALGADOS 
  {
    id: 'salgados',
    label: 'Salgados',
    emoji: '🥐',
    img: '', //espaço para colocar o link da imagem que está na pasta (codigo ainda não está 100%)
    products: [
      {
        name: 'ADICIONAR ITEM',
        price: '00,00',
        desc: 'PROJETO AINDA ESTÁ SENDO FEITO (Otavio)',
        img: ''
      },
      // 
    ]
  },

];

/* Renderização de categorias (Varre o array CATEGORIES e gera o HTML de cada card)*/
function renderCategories() {
  document.getElementById('categories').innerHTML = CATEGORIES.map(cat => `
    <div class="category-card" onclick="openModal('${cat.id}')">
      <img src="${cat.img}" alt="${cat.label}" onerror="this.style.display='none'">
      <div class="cat-label">${cat.label}</div>
      <div class="arrow">›</div>
    </div>
  `).join('');
}

/* Abre modal com produtos e filtra o produto correto pelo ID e preenche o grid interno*/
function openModal(catId) {
  const cat = CATEGORIES.find(c => c.id === catId);
  document.getElementById('modalTitle').textContent = `${cat.emoji}  ${cat.label}`;

  const grid = document.getElementById('productsGrid');
  if (!cat.products.length) {
    grid.innerHTML = `<div class="empty-state"><span>${cat.emoji}</span>Em breve!</div>`;
  } else {
    grid.innerHTML = cat.products.map(p => `
      <div class="product-card">
        ${p.img
          ? `<img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'">`
          : `<div class="no-img">${cat.emoji}</div>`}
        <div class="product-info">
          <h3>${p.name}</h3>
          <div class="price">R$ ${p.price}</div>
          ${p.desc ? `<div class="desc">${p.desc}</div>` : ''}
        </div>
      </div>
    `).join('');
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

/*  Fecha modal */
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

renderCategories();
</script>
</body>
</html>
