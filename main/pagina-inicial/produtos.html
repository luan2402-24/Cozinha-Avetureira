  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" href="../fotos_icons/logo_icon_colher.png" type="image/png">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/nav_header_footer.css">
  <link rel="stylesheet" href="../css/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

  <style>
    .logo-icon img {
      width: 70%;
    }

    /* HERO */
    .hero {
      padding: 52px 48px 32px;
      text-align: center;
    }

    /* carrossel de imagem */
    .carrossel-section {
      position: relative;
      width: 100%;
    }

    .carrossel {
      width: 100%;
      max-width: 100%;
      /* ocupa toda a largura */
      position: relative;
      border-radius: 0;
      /* sem borda arredondada no topo da página */
      overflow: hidden;
      margin: 0;
    }

    .carrossel-track {
      display: flex;
      overflow-x: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
    }

    .carrossel-track img {
      width: 100%;
      flex: none;
      scroll-snap-align: start;
      display: block;
      object-fit: cover;
      height: 100vh;
      /* preenche toda a altura da tela */
      min-height: 200px;
    }

    /* Overlay escuro sobre a imagem para o texto ficar legível */
    .carrossel-overlay {
      position: absolute;
      inset: 0;
      background: rgba(50, 25, 5, 0.35);
      z-index: 1;
      pointer-events: none;
    }

    /* Título centralizado sobre a imagem */
    .carrossel-titulo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
      color: #F5F0E8;
      pointer-events: none;
    }

    .carrossel-titulo h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: #F5F0E8;
      text-shadow: 0 2px 8px rgba(30, 10, 0, 0.4);
      margin-bottom: 0.5rem;
    }

    .carrossel-titulo p {
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: #EDE5D8;
      text-shadow: 0 1px 4px rgba(30, 10, 0, 0.4);
    }

    /* Botões de navegação */
    .carrossel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(245, 240, 232, 0.75);
      border: 1.5px solid #C4A882;
      color: #7A4E28;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s, color 0.2s;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carrossel-btn:hover {
      background: #C4A882;
      color: #fff;
    }

    .carrossel-btn.prev {
      left: 20px;
    }

    .carrossel-btn.next {
      right: 20px;
    }

    /* Dots */
    .carrossel-dots {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 3;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(245, 240, 232, 0.6);
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.2s;
    }

    .dot.active {
      background: #F5F0E8;
      transform: scale(1.35);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--marrom-escuro);
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 15px;
      color: var(--marrom-escuro);
      max-width: 440px;
      margin: 0 auto;
    }

    /* Grade de categoria para reorganização automática conforme a largura. */
    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      padding: 20px 48px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .category-card {
      background: var(--branco);
      border: 1.5px solid var(--creme);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s;
    }

    .category-card:hover {
      /* Ganha sombra ao passar o mouse */
      transform: translateY(-6px);
      box-shadow: 0 16px 40px var(--shadow);
      border-color: var(--mostarda);
    }

    .category-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }

    .category-card:hover img {
      transform: scale(1.04);
    }

    .cat-label {
      padding: 18px 20px;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--marrom-escuro);
    }

    .arrow {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--mostarda);
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      transition: opacity .25s;
    }

    .category-card:hover .arrow {
      opacity: 1;
    }

    /* QUOTE (Identidade da marca) */
    .quote-section {
      background: var(--creme);
      padding: 52px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
    }

    .quote-icons {
      font-size: 3.2rem;
    }

    .quote-text {
      text-align: center;
    }

    .quote-text p {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.05rem, 2.5vw, 1.4rem);
      color: var(--marrom);
      line-height: 1.45;
      font-style: italic;
      margin-bottom: 12px;
    }

    .signature {
      font-family: 'Dancing Script', cursive;
      font-size: 1.55rem;
      color: var(--marrom-escuro);
    }

    /* MODAL */
    .modal-overlay {
      /* modal com desfoque de fundo (efeito de vidro)*/
      position: fixed;
      inset: 0;
      background: rgba(30, 20, 10, .55);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px 40px;
      overflow-y: auto;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--creme);
      border-radius: 6px;
      width: 100%;
      max-width: 900px;
      animation: slideUp .3s ease;
      overflow: hidden;
    }

    @keyframes slideUp {
      from {
        transform: translateY(28px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      background: var(--marrom-escuro);
      color: #fff;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-style: italic;
    }

    .modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 26px;
      cursor: pointer;
      line-height: 1;
      transition: color .2s;
    }

    .modal-close:hover {
      color: var(--mostarda);
    }

    /* PRODUCTS GRID */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
      gap: 20px;
      padding: 28px;
    }

    .product-card {
      border: 1.5px solid var(--creme);
      border-radius: 4px;
      overflow: hidden;
      background: #fff;
      transition: box-shadow .2s, transform .2s;
    }

    .product-card:hover {
      box-shadow: 0 8px 24px var(--shadow);
      transform: translateY(-3px);
    }

    .product-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .no-img {
      width: 100%;
      height: 160px;
      background: var(--creme);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
    }

    .product-info {
      padding: 14px 16px;
    }

    .product-info h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      margin-bottom: 5px;
      color: var(--marrom-escuro);
    }

    .product-info .price {
      font-weight: 600;
      color: var(--marrom);
      font-size: .95rem;
    }

    .product-info .desc {
      font-size: .8rem;
      color: #999;
      margin-top: 5px;
      line-height: 1.45;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #bbb;
      font-style: italic;
      grid-column: 1 / -1;
    }

    .empty-state span {
      font-size: 3rem;
      display: block;
      margin-bottom: 10px;
    }

    @media (max-width: 600px) {
      nav {
        padding: 14px 20px;
      }

        padding: 16px 20px 40px;
        gap: 16px;
      }

      .hero {

      }

      .quote-section {

      footer {

      }

      .footer-links {
        gap: 20px;
      }

      .products-grid {
        padding: 18px;
        gap: 14px;
      }
    }
  </style>
</head>

    /* Renderização de categorias (Varre o array CATEGORIES e gera o HTML de cada card)*/
    function renderCategories() {
      document.getElementById('categories').innerHTML = CATEGORIES.map(cat => `
    <div class="category-card" onclick="openModal('${cat.id}')">
      <img src="${cat.img}" alt="${cat.label}" onerror="this.style.display='none'">
      <div class="cat-label">${cat.label}</div>
      <div class="arrow">›</div>
    </div>
  `).join('');
    }

    /* Abre modal com produtos e filtra o produto correto pelo ID e preenche o grid interno*/
    function openModal(catId) {
      const cat = CATEGORIES.find(c => c.id === catId);
      document.getElementById('modalTitle').textContent = `${cat.emoji}  ${cat.label}`;

      const grid = document.getElementById('productsGrid');
      if (!cat.products.length) {
        grid.innerHTML = `<div class="empty-state"><span>${cat.emoji}</span>Em breve!</div>`;
      } else {
        grid.innerHTML = cat.products.map(p => `
      <div class="product-card">
        ${p.img
            ? `<img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'">`
            : `<div class="no-img">${cat.emoji}</div>`}
        <div class="product-info">
          <h3>${p.name}</h3>
          <div class="price">R$ ${p.price}</div>
          ${p.desc ? `<div class="desc">${p.desc}</div>` : ''}
        </div>
      </div>
    `).join('');
      }

      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    /*  Fecha modal */
    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    renderCategories();
