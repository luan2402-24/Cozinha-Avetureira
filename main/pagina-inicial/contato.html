<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha Aventureira — Produtos</title>
  <link rel="icon" href="../fotos_icons/logo_icon_colher.png" type="image/png">
  <link rel="stylesheet" href="../css/global.css">

<style>
  /* ================== HERO ================== */
  .hero {
    padding: 52px 48px 32px;
    text-align: center;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    color: var(--marrom-escuro);
    margin-bottom: 10px;
  }

  .hero p {
    color: var(--marrom);
  }

  /* ================== CONTATO ================== */
  .contact-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 24px;
    padding: 20px 48px 60px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .contact-card {
    background: var(--branco);
    border: 1.5px solid var(--creme);
    border-radius: 6px;
    padding: 22px;
    text-align: center;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
  }

  .contact-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 16px 40px var(--shadow);
    border-color: var(--mostarda);
  }

  .contact-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    margin-bottom: 10px;
    color: var(--marrom-escuro);
  }

  .contact-card p {
    color: var(--marrom);
    font-size: 0.95rem;
    line-height: 1.5;
  }
</style>

<header>
  <div class="logo-icon">

</div>

<div class="contact-container">
  <div class="contact-card">

    <p>São Roque de Minas - MG</p>
  </div>

  </div>

  <div class="contact-card">

</div>
