<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha Aventureira — Produtos</title>

  <link rel="icon" href="fotos_icons/logo_icon_colher.png" type="image/png">
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="nav_header_footer.css">
  <link rel="stylesheet" href="index.css">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Cormorant+Garamond:wght@400;500&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

  <style>
    /* ================= HERO / CARROSSEL ================= */

    .carrossel-section {
      position: relative;
      width: 100%;
    }

    .carrossel {
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .carrossel-track {
      display: flex;
      transition: transform 0.5s ease;
    }

    .carrossel-track img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      flex-shrink: 0;
      opacity: 0.45;
    }

    .carrossel-overlay {
      position: absolute;
      inset: 0;
      background: rgba(50, 25, 5, 0.35);
      z-index: 1;
      pointer-events: none;
    }

    .carrossel-titulo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      text-align: center;
      color: #F5F0E8;
      width: 90%;
      max-width: 700px;
      pointer-events: none;
    }

    .carrossel-titulo h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      color: #F5F0E8;
      text-shadow: 0 2px 8px rgba(30, 10, 0, 0.4);
      margin-bottom: 0.5rem;
    }

    .carrossel-titulo p {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: #EDE5D8;
      text-shadow: 0 1px 4px rgba(30, 10, 0, 0.4);
      line-height: 1.5;
    }

    .carrossel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(245, 240, 232, 0.75);
      border: 1.5px solid #C4A882;
      color: #7A4E28;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s, color 0.2s;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .carrossel-btn:hover {
      background: #C4A882;
      color: #fff;
    }

    .carrossel-btn.prev {
      left: 20px;
    }

    .carrossel-btn.next {
      right: 20px;
    }

    .carrossel-dots {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 3;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(245, 240, 232, 0.6);
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.2s;
    }

    .dot.active {
      background: #F5F0E8;
      transform: scale(1.25);
    }

    /* ================= CATEGORIAS ================= */

    .categories {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 24px;
      padding: 40px 48px 60px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .category-card {
      background: var(--branco);
      border: 1.5px solid var(--creme);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s;
    }

    .category-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
      border-color: var(--mostarda);
    }

    .category-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }

    .category-card:hover img {
      transform: scale(1.04);
    }

    .cat-label {
      padding: 18px 20px;
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--marrom-escuro);
    }

    .arrow {
      position: absolute;
      top: 14px;
      right: 14px;
      background: var(--mostarda);
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      transition: opacity .25s;
    }

    .category-card:hover .arrow {
      opacity: 1;
    }

    /* ================= FRASE ================= */

    .quote-section {
      background: var(--creme);
      padding: 52px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      text-align: center;
    }

    .quote-text p {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.05rem, 2.5vw, 1.4rem);
      color: var(--marrom);
      line-height: 1.45;
      font-style: italic;
      margin-bottom: 12px;
    }

    .signature {
      font-family: 'Dancing Script', cursive;
      font-size: 1.7rem;
      color: var(--marrom-escuro);
    }

    /* ================= MODAL ================= */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 20, 10, .55);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px 40px;
      overflow-y: auto;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--creme);
      border-radius: 8px;
      width: 100%;
      max-width: 950px;
      animation: slideUp .3s ease;
      overflow: hidden;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.2);
    }

    @keyframes slideUp {
      from {
        transform: translateY(28px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      background: var(--marrom-escuro);
      color: #fff;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      margin: 0;
    }

    .modal-close {
      background: none;
      border: none;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      transition: color .2s;
    }

    .modal-close:hover {
      color: var(--mostarda);
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 20px;
      padding: 28px;
    }

    .product-card {
      border: 1.5px solid var(--creme);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      transition: box-shadow .2s, transform .2s;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      transform: translateY(-3px);
    }

    .product-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .no-img {
      width: 100%;
      height: 180px;
      background: var(--creme);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
    }

    .product-info {
      padding: 14px 16px 8px;
      flex: 1;
    }

    .product-info h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      margin-bottom: 6px;
      color: var(--marrom-escuro);
    }

    .product-info .desc {
      font-size: .85rem;
      color: #7a6a58;
      margin-top: 5px;
      line-height: 1.45;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: #8d7d6d;
      font-style: italic;
      grid-column: 1 / -1;
    }

    .empty-state span {
      font-size: 3rem;
      display: block;
      margin-bottom: 10px;
    }

    /* ================= BOTÃO WHATSAPP ================= */

    .product-card .whatsapp-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      margin: 0 16px 16px;
      padding: 10px 0;
      background: #25D366;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .85rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .product-card .whatsapp-btn:hover {
      background: #1ebe5d;
      transform: translateY(-1px);
    }

    .product-card .whatsapp-btn svg {
      width: 16px;
      height: 16px;
      fill: #fff;
      flex-shrink: 0;
    }

    /* ================= RESPONSIVO ================= */

    @media (max-width: 900px) {
      .carrossel-track img {
        height: 75vh;
      }
    }

    @media (max-width: 600px) {
      .categories {
        padding: 20px 20px 40px;
        gap: 16px;
      }

      .quote-section {
        padding: 36px 20px;
      }

      .products-grid {
        padding: 18px;
        gap: 14px;
      }

      .carrossel-track img {
        height: 60vh;
      }

      .carrossel-btn {
        width: 38px;
        height: 38px;
      }

      .carrossel-btn.prev {
        left: 10px;
      }

      .carrossel-btn.next {
        right: 10px;
      }
    }
  </style>
</head>

<body>

  <header>
      <a href="index.html" class="logo-link">
    <div class="logo-icon">
      <img src="fotos_icons/logo_sem_fundo.png" alt="Logo">
    </div>
  </a>

    <nav>
      <a href="index.html">Início</a>
      <a href="produtos.html" class="active">Produtos</a>
      <a href="sobre.html">Sobre</a>
      <a href="contato.html">Contatos</a>
    </nav>
  </header>

  <section class="carrossel-section">
    <div class="carrossel" id="carrossel">
      <div class="carrossel-track" id="track">
        <img src="fotos_produtos/Fotos Diversas/IMG_1022.jpg" alt="Produto 1">
        <img src="fotos_produtos/Fotos Diversas/IMG_1016.jpg" alt="Produto 2">
        <img src="fotos_produtos/Fotos Diversas/IMG_1147.jpg" alt="Produto 3">
      </div>

      <div class="carrossel-overlay"></div>

      <div class="carrossel-titulo">
        <h1>Nossos Produtos</h1>
        <p>Escolha uma categoria e veja todas as delícias disponíveis</p>
      </div>

      <button class="carrossel-btn prev" id="prev">&#8249;</button>
      <button class="carrossel-btn next" id="next">&#8250;</button>

      <div class="carrossel-dots" id="dots"></div>
    </div>
  </section>

  <section class="categories" id="categories"></section>

  <section class="quote-section">
    <div class="quote-text">
      <p>Um projeto sobre coragem,<br>cozinha e amor!</p>
      <div class="signature">Taísa Fonseca</div>
    </div>
  </section>

  <footer>
    <div class="footer-links">
      <a href="#"></a>
      <a href="#"></a>
    </div>

    <div class="social-icons">
      <a href="https://www.instagram.com/cozinhaventureira" target="_blank">
        <img src="fotos_icons/instagram.png" alt="Instagram">
      </a>

      <a href="https://www.facebook.com/cozinhaaventureira" target="_blank">
        <img src="fotos_icons/facebook.png" alt="Facebook">
      </a>

      <a href="https://wa.me/5537998696011?text=Olá,%20vim%20pelo%20site%20e%20quero%20saber%20mais" target="_blank">
        <img src="fotos_icons/whatsapp.png" alt="WhatsApp">
      </a>
    </div>
  </footer>

  <!-- MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="products-grid" id="productsGrid"></div>
    </div>
  </div>

  <script>
    const CATEGORIES = [
      {
        id: 'doces',
        label: 'DOCES',
        emoji: '🍫',
        img: 'fotos_produtos/Bom_BOM/CAPA1.jpg',
        products: [
          {
            name: 'Bombom',
            desc: 'Cozinha Aventureira',
            img: 'fotos_produtos/Bom_BOM/IMG_0326.jpg'
          },
          {
            name: 'Caixa de Docinhos',
            desc: 'Cozinha Aventureira',
            img: 'fotos_produtos/Caixa_De_docin/IMG_4319.jpg'
          },
          {
            name: 'Caramelo',
            desc: 'Cozinha Aventureira',
            img: 'fotos_produtos/Fotos Diversas/CARAMELO.jpg'
          }
        ]
      },
      {
        id: 'bolos',
        label: 'BOLOS',
        emoji: '🎂',
        img: 'fotos_produtos/BOLOS/CAPA2.jpg',
        products: [
          {
            name: 'Bolo Alpino com Coco',
            desc: 'Cozinha Aventureira',
            img: 'fotos_produtos/Bolos_NU_pote/ALPINO_COM_COCO.jpg'
          },
          {
            name: 'Bolo Red Velvet',
            desc: 'Cozinha Aventureira',
            img: 'fotos_produtos/Bolos_NU_pote/VERMELHA.jpg'
          },
          {
            name: 'Bolo no pote',
            desc: 'Cozinha Aventureira',
            img: 'fotos_produtos/Bolos_NU_pote/foto3.jpg'
          }
        ]
      },
      {
        id: 'salgados',
        label: 'SALGADOS',
        emoji: '🥐',
        img: 'fotos_produtos/Fotos Diversas/CAPA.jpg',
        products: [
          {
            name: 'Pão Integral',
            desc: 'Cozinha Aventureira',
            img: 'fotos_produtos/Salgado/integral.jpeg'
          },
          {
            name: 'Pão Australiano',
            desc: 'Cozinha Aventureira',
            img: 'fotos_produtos/Salgado/australiano.jpeg'
          }
        ]
      }
    ];

    const WHATSAPP_NUMBER = '5537998696011';
    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const productsGrid = document.getElementById('productsGrid');
    const categoriesContainer = document.getElementById('categories');

    const WA_ICON = `
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
    `;

    function renderCategories() {
      categoriesContainer.innerHTML = CATEGORIES.map(cat => `
        <div class="category-card" onclick="openModal('${cat.id}')">
          <img src="${cat.img}" alt="${cat.label}" onerror="this.style.display='none'">
          <div class="cat-label">${cat.label}</div>
          <div class="arrow">›</div>
        </div>
      `).join('');
    }

    function openModal(catId) {
      const cat = CATEGORIES.find(c => c.id === catId);
      if (!cat) return;

      modalTitle.textContent = `${cat.emoji} ${cat.label}`;

      if (!cat.products || cat.products.length === 0) {
        productsGrid.innerHTML = `
          <div class="empty-state">
            <span>${cat.emoji}</span>
            Em breve!
          </div>
        `;
      } else {
        productsGrid.innerHTML = cat.products.map(product => {
          const msg = encodeURIComponent(`Olá, vim pelo site e tenho interesse no produto: ${product.name}`);
          const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;

          return `
            <div class="product-card">
              ${
                product.img
                  ? `<img src="${product.img}" alt="${product.name}" onerror="this.outerHTML='<div class=&quot;no-img&quot;>${cat.emoji}</div>'">`
                  : `<div class="no-img">${cat.emoji}</div>`
              }

              <div class="product-info">
                <h3>${product.name}</h3>
                ${product.desc ? `<div class="desc">${product.desc}</div>` : ''}
              </div>

              <a class="whatsapp-btn" href="${waLink}" target="_blank" rel="noopener">
                ${WA_ICON}
                Pedir pelo WhatsApp
              </a>
            </div>
          `;
        }).join('');
      }

      modalOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modalOverlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);

    modalOverlay.addEventListener('click', function (e) {
      if (e.target === modalOverlay) {
        closeModal();
      }
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    renderCategories();

    /* ================= CARROSSEL ================= */

    const track = document.getElementById('track');
    const slides = document.querySelectorAll('.carrossel-track img');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const dotsContainer = document.getElementById('dots');

    let currentIndex = 0;

    slides.forEach((_, index) => {
      const dot = document.createElement('button');
      dot.classList.add('dot');

      if (index === 0) {
        dot.classList.add('active');
      }

      dot.addEventListener('click', () => {
        goToSlide(index);
      });

      dotsContainer.appendChild(dot);
    });

    const dots = document.querySelectorAll('.dot');

    function updateCarousel() {
      track.style.transform = `translateX(-${currentIndex * 100}vw)`;

      dots.forEach(dot => dot.classList.remove('active'));
      dots[currentIndex].classList.add('active');
    }

    function goToSlide(index) {
      currentIndex = index;
      updateCarousel();
    }

    function nextSlide() {
      currentIndex++;
      if (currentIndex >= slides.length) {
        currentIndex = 0;
      }
      updateCarousel();
    }

    function prevSlide() {
      currentIndex--;
      if (currentIndex < 0) {
        currentIndex = slides.length - 1;
      }
      updateCarousel();
    }

    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);

    setInterval(nextSlide, 4000);
  </script>
</body>

</html>
