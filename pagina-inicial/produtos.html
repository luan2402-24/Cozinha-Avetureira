<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozinha Aventureira — Produtos</title>
    <link rel="icon" href="../fotos_icons/logo_icon_colher.png" type="image/png">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/nav_header_footer.css">
    <link rel="stylesheet" href="../css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* HERO */
        
        .hero {
            padding: 52px 48px 32px;
            text-align: center;
        }
        /* carrossel de imagem */
        
        .carrossel-section {
            position: relative;
            width: 100%;
        }
        
        .carrossel {
            width: 100%;
            max-width: 100%;
            position: relative;
            border-radius: 0;
            overflow: hidden;
            margin: 0;
        }
        
        .carrossel-track {
            display: flex;
            width: 300%;
            /* 3 imagens */
            transition: transform 0.5s ease;
        }
        
        .carrossel-track img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            opacity: 0.4;
            flex-shrink: 0;
        }
        
        .carrossel-overlay {
            position: absolute;
            inset: 0;
            background: rgba(50, 25, 5, 0.35);
            z-index: 1;
            pointer-events: none;
        }
        
        .carrossel-titulo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            color: #F5F0E8;
            pointer-events: none;
        }
        
        .carrossel-titulo h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 700;
            color: #F5F0E8;
            text-shadow: 0 2px 8px rgba(30, 10, 0, 0.4);
            margin-bottom: 0.5rem;
        }
        
        .carrossel-titulo p {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: #EDE5D8;
            text-shadow: 0 1px 4px rgba(30, 10, 0, 0.4);
        }
        
        .carrossel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(245, 240, 232, 0.75);
            border: 1.5px solid #C4A882;
            color: #7A4E28;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: background 0.2s, color 0.2s;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .carrossel-btn:hover {
            background: #C4A882;
            color: #fff;
        }
        
        .carrossel-btn.prev {
            left: 20px;
        }
        
        .carrossel-btn.next {
            right: 20px;
        }
        
        .carrossel-dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 3;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(245, 240, 232, 0.6);
            cursor: pointer;
            border: none;
            transition: background 0.2s, transform 0.2s;
        }
        
        .dot.active {
            background: #F5F0E8;
            transform: scale(1.35);
        }
        
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            color: var(--marrom-escuro);
            line-height: 1.2;
            margin-bottom: 10px;
        }
        
        .hero p {
            font-size: 15px;
            color: var(--marrom-escuro);
            max-width: 440px;
            margin: 0 auto;
        }
        
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            padding: 20px 48px 60px;
            max-width: 1100px;
            margin: 0 auto;
        }
        
        .category-card {
            background: var(--branco);
            border: 1.5px solid var(--creme);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform .25s ease, box-shadow .25s ease, border-color .25s;
        }
        
        .category-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px var(--shadow);
            border-color: var(--mostarda);
        }
        
        .category-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            transition: transform .4s ease;
        }
        
        .category-card:hover img {
            transform: scale(1.04);
        }
        
        .cat-label {
            padding: 18px 20px;
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--marrom-escuro);
        }
        
        .arrow {
            position: absolute;
            top: 14px;
            right: 14px;
            background: var(--mostarda);
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            opacity: 0;
            transition: opacity .25s;
        }
        
        .category-card:hover .arrow {
            opacity: 1;
        }
        
        .quote-section {
            background: var(--creme);
            padding: 52px 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .quote-text {
            text-align: center;
        }
        
        .quote-text p {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.05rem, 2.5vw, 1.4rem);
            color: var(--marrom);
            line-height: 1.45;
            font-style: italic;
            margin-bottom: 12px;
        }
        
        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 1.55rem;
            color: var(--marrom-escuro);
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 20, 10, .55);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding: 60px 20px 40px;
            overflow-y: auto;
        }
        
        .modal-overlay.open {
            display: flex;
        }
        
        .modal {
            background: var(--creme);
            border-radius: 6px;
            width: 100%;
            max-width: 900px;
            animation: slideUp .3s ease;
            overflow: hidden;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(28px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-header {
            background: var(--marrom-escuro);
            color: #fff;
            padding: 22px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .modal-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem;
            font-style: italic;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            line-height: 1;
            transition: color .2s;
        }
        
        .modal-close:hover {
            color: var(--mostarda);
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
            gap: 20px;
            padding: 28px;
        }
        
        .product-card {
            border: 1.5px solid var(--creme);
            border-radius: 4px;
            overflow: hidden;
            background: #fff;
            transition: box-shadow .2s, transform .2s;
        }
        
        .product-card:hover {
            box-shadow: 0 8px 24px var(--shadow);
            transform: translateY(-3px);
        }
        
        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            display: block;
        }
        
        .no-img {
            width: 100%;
            height: 160px;
            background: var(--creme);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
        }
        
        .product-info {
            padding: 14px 16px;
        }
        
        .product-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            margin-bottom: 5px;
            color: var(--marrom-escuro);
        }
        
        .product-info .price {
            font-weight: 600;
            color: var(--marrom);
            font-size: .95rem;
        }
        
        .product-info .desc {
            font-size: .8rem;
            color: #999;
            margin-top: 5px;
            line-height: 1.45;
        }
        
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #bbb;
            font-style: italic;
            grid-column: 1 / -1;
        }
        
        .empty-state span {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }
        
        @media (max-width: 600px) {
            nav {
                padding: 14px 20px;
            }
            .categories {
                padding: 16px 20px 40px;
                gap: 16px;
            }
            .hero {
                padding: 36px 20px 20px;
            }
            .quote-section {
                padding: 36px 20px;
            }
            footer {
                padding: 24px 20px;
            }
            .footer-links {
                gap: 20px;
            }
            .products-grid {
                padding: 18px;
                gap: 14px;
            }
        }
        
        .product-card .whatsapp-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin: 10px 16px 14px;
            padding: 9px 0;
            background: #25D366;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: .82rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
        }
        
        .product-card .whatsapp-btn:hover {
            background: #1ebe5d;
            transform: translateY(-1px);
        }
        
        .product-card .whatsapp-btn svg {
            width: 16px;
            height: 16px;
            fill: #fff;
            flex-shrink: 0;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo-icon">
            <img src="../fotos_icons/logo_sem_fundo.png" alt="Logo">
        </div>

        <nav>
            <a href="../pagina-inicial/index.html">Início</a>
            <a href="../pagina-inicial/produtos.html" class="active">Produtos</a>
            <a href="../pagina-inicial/sobre.html">Sobre</a>
            <a href="../pagina-inicial/contato.html">Contatos</a>
        </nav>
    </header>

    <section class="carrossel-section">
        <div class="carrossel" id="carrossel">
            <div class="carrossel-track" id="track">
                <img src="../foto_produtos/Fotos Diversas/IMG_1022.jpg" alt="Produto 1">
                <img src="../foto_produtos/Fotos Diversas/IMG_1016.jpg" alt="Produto 2">
                <img src="../foto_produtos/Fotos Diversas/IMG_1147.jpg" alt="Produto 3">
            </div>
            <div class="carrossel-overlay"></div>
            <div class="carrossel-titulo">
                <h1>Nossos Produtos</h1>
                <p>Escolha uma categoria e veja todas as delícias disponíveis</p>
            </div>
            <button class="carrossel-btn prev" id="prev">&#8249;</button>
            <button class="carrossel-btn next" id="next">&#8250;</button>
            <div class="carrossel-dots" id="dots"></div>
        </div>
    </section>

    <div class="categories" id="categories"></div>

    <div class="quote-section">
        <div class="quote-text">
            <p>Um projeto sobre coragem,<br>cozinha e amor!</p>
            <div class="signature">Taísa Fonseca</div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">Termos de Uso</a>
            <a href="#">Política de Privacidade</a>
        </div>
        <div class="social-icons">
            <a href="https://www.instagram.com/cozinhaventureira">
                <img src="../fotos_icons/instagram.png" alt="Instagram">
            </a>
            <a href="https://www.facebook.com/cozinhaaventureira">
                <img src="../fotos_icons/facebook.png" alt="Facebook">
            </a>
            <a href="https://wa.me/5537998696011?text=Olá,%20vim%20pelo%20site%20e%20quero%20saber%20mais" target="_blank">
                <img src="../fotos_icons/whatsapp.png" alt="WhatsApp">
            </a>
        </div>
    </footer>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </div>

    <script>
        const CATEGORIES = [{
            id: 'doces',
            label: 'DOCES',
            emoji: '🍫',
            img: '../foto_produtos/Bom_BOM/CAPA1.jpg', //adicionar qualquer imagem de doce
            products: [{
                name: 'BOMBON',
                desc: '',
                img: '../foto_produtos/Bom_BOM/IMG_0326.jpg'
            }, {
                name: 'CAIXA DE DOCINHOS',
                desc: '',
                img: '../foto_produtos/Caixa_De_docin/IMG_4319.jpg'
            }, {
                name: 'CARAMELO',
                desc: '',
                img: '../foto_produtos/Fotos Diversas/CARAMELO.jpg'
            }]
        }, {
            id: 'bolos',
            label: 'BOLOS',
            emoji: '🎂',
            img: '../foto_produtos/BOLOS/CAPA2.jpg', //adicionar qualquer imagem de bolo 
            products: [{
                name: 'BOLO 1',
                desc: 'Cozinha Aventureira',
                img: '../foto_produtos/Bolos_NU_pote/ALPINO_COM_COCO.jpg'
            }, {
                name: 'BOLO 2',
                desc: 'Cozinha Aventureira',
                img: '../foto_produtos/Bolos_NU_pote/VERMELHA.jpg'
            }, {
                name: 'BOLO 3',
                desc: 'Cozinha Aventureira',
                img: '../foto_produtos/Bolos_NU_pote/foto3.jpg'
            }]
        }, {
            id: 'salgados',
            label: 'SALGADOS',
            emoji: '🥐',
            img: '../foto_produtos/Fotos Diversas/CAPA.jpg', //adicionar qualquer imagem de salgado
            products: [{
                name: 'Pão Integral',
                desc: 'Cozinha Aventureira',
                img: '../foto_produtos/Salgado/integral.jpeg'
            }, {
                name: 'Pão Australiano',
                desc: 'Cozinha Aventureira',
                img: '../foto_produtos/Salgado/australiano.jpeg'
            }, ]
                }];

        function renderCategories() {
            document.getElementById('categories').innerHTML = CATEGORIES.map(cat => `
        <div class="category-card" onclick="openModal('${cat.id}')">
          <img src="${cat.img}" alt="${cat.label}" onerror="this.style.display='none'">
          <div class="cat-label">${cat.label}</div>
          <div class="arrow">›</div>
        </div>
      `).join('');
        }

        function openModal(catId) {
            const cat = CATEGORIES.find(c => c.id === catId);
            document.getElementById('modalTitle').textContent = `${cat.emoji}  ${cat.label}`;

            const WHATSAPP_NUMBER = '5537998696011';
            const WA_ICON = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>`;

            const grid = document.getElementById('productsGrid');
            if (!cat.products.length) {
                grid.innerHTML = `<div class="empty-state"><span>${cat.emoji}</span>Em breve!</div>`;
            } else {
                grid.innerHTML = cat.products.map(p => {
                            const msg = encodeURIComponent(`Olá, vim pelo site e tenho interesse no produto: ${p.name}`);
                            const waLink = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
                            return `
          <div class="product-card">
            ${p.img
                ? `<img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'">`
                : `<div class="no-img">${cat.emoji}</div>`}
            <div class="product-info">
              <h3>${p.name}</h3>
              ${p.desc ? `<div class="desc">${p.desc}</div>` : ''}
            </div>
            <a class="whatsapp-btn" href="${waLink}" target="_blank" rel="noopener">
              ${WA_ICON} Pedir pelo WhatsApp
            </a>
          </div>`;
        }).join('');
    }

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
}

      


    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

      renderCategories();

    const track = document.getElementById('track');
    const slides = document.querySelectorAll('.carrossel-track img');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const dotsContainer = document.getElementById('dots');

    let currentIndex = 0;

    slides.forEach((_, index) => {
        const dot = document.createElement('button');
        dot.classList.add('dot');

        if (index === 0) {
            dot.classList.add('active');
        }

        dot.addEventListener('click', () => {
            goToSlide(index);
        });

        dotsContainer.appendChild(dot);
    });

    const dots = document.querySelectorAll('.dot');

    function updateCarousel() {
        track.style.transform = `translateX(-${currentIndex * 100}vw)`;

        dots.forEach(dot => dot.classList.remove('active'));
        dots[currentIndex].classList.add('active');
    }

    function goToSlide(index) {
        currentIndex = index;
        updateCarousel();
    }

    function nextSlide() {
        currentIndex++;

        if (currentIndex >= slides.length) {
            currentIndex = 0;
        }

        updateCarousel();
    }

    function prevSlide() {
        currentIndex--;

        if (currentIndex < 0) {
            currentIndex = slides.length - 1;
        }

        updateCarousel();
    }

    nextBtn.addEventListener('click', nextSlide);
    prevBtn.addEventListener('click', prevSlide);

    setInterval(nextSlide, 4000);
    </script>
</body>

</html>
